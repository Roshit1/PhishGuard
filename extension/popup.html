<!DOCTYPE html>
<html lang=\"en\">
<head>
  <meta charset=\"UTF-8\">
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
  <title>PhishGuard</title>
  <style>
    body {
      width: 300px;
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #09090b;
      color: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    h1 {
      margin: 0;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-card {
      padding: 16px;
      border-radius: 8px;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
    }
    .status-safe { color: #10b981; }
    .status-suspicious { color: #f59e0b; }
    .status-phishing { color: #ef4444; }
    .score {
      font-size: 2rem;
      font-weight: bold;
      margin: 8px 0;
    }
    .reasons {
      text-align: left;
      font-size: 0.85rem;
      color: #a1a1aa;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    ul {
      margin: 4px 0 0;
      padding-left: 20px;
    }
    .loader {
      text-align: center;
      color: #a1a1aa;
    }
  </style>
</head>
<body>
  <h1>🛡️ PhishGuard</h1>
  
  <div id=\"content\" class=\"status-card\">
    <div class=\"loader\">Scanning current page...</div>
  </div>

  <script src=\"popup.js\"></script>
</body>
</html>
